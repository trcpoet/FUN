    filter="url(#glow)"
  />

  <path d="M14.5 11L19 14L14.5 17V11Z" fill="#00F2FE" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.55;1" dur="2s" repeatCount="indefinite" />
  </path>

  <path
    d="M12 24H20"
