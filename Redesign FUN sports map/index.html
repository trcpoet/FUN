
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0B0C10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FUN" />
    <meta name="application-name" content="FUN" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FUN – Sports Map" />
    <meta property="og:description" content="Find and join pickup sports games near you." />
    <meta property="og:image" content="/android-chrome-512x512.png" />
    <link rel="preconnect" href="https://api.mapbox.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.mapbox.com" />
    <title>FUN – Sports Map</title>
    <style>
      .fun-orbit-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;width:100%;height:100%;min-height:100vh;min-height:100dvh;background:#0a0f1c;color:#94a3b8;font-family:system-ui,-apple-system,sans-serif}
      .fun-orbit-loader__stage{position:relative;width:9rem;height:9rem}
      .fun-orbit-loader__core{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:800;letter-spacing:.2em;color:#10b981;text-shadow:0 0 24px rgba(16,185,129,.45)}
      .fun-orbit-loader__orbit{position:absolute;inset:0;animation:fun-orbit-spin 3.2s linear infinite}
      .fun-orbit-loader__icon{position:absolute;top:50%;left:50%;width:1.75rem;height:1.75rem;margin:-.875rem;display:flex;align-items:center;justify-content:center;font-size:1.25rem;transform:rotate(var(--angle)) translateY(-4.25rem) rotate(calc(-1 * var(--angle)))}
      .fun-orbit-loader__icon:nth-child(1){--angle:0deg}
      .fun-orbit-loader__icon:nth-child(2){--angle:60deg}
      .fun-orbit-loader__icon:nth-child(3){--angle:120deg}
      .fun-orbit-loader__icon:nth-child(4){--angle:180deg}
      .fun-orbit-loader__icon:nth-child(5){--angle:240deg}
      .fun-orbit-loader__icon:nth-child(6){--angle:300deg}
      .fun-orbit-loader__tagline{margin:0;font-size:.875rem;font-weight:500;color:#64748b}
      @keyframes fun-orbit-spin{to{transform:rotate(360deg)}}
      @media (prefers-reduced-motion:reduce){.fun-orbit-loader__orbit{animation:none}.fun-orbit-loader__icon{transform:rotate(var(--angle)) translateY(-3.5rem) rotate(calc(-1 * var(--angle)))}}
    </style>
  </head>

  <body style="margin:0;background:#0A0F1C">
    <div id="root">
      <div class="fun-orbit-loader" role="status" aria-live="polite">
        <div class="fun-orbit-loader__stage" aria-hidden="true">
          <div class="fun-orbit-loader__orbit">
            <span class="fun-orbit-loader__icon">🏀</span>
            <span class="fun-orbit-loader__icon">⚽</span>
            <span class="fun-orbit-loader__icon">🏈</span>
            <span class="fun-orbit-loader__icon">🎾</span>
            <span class="fun-orbit-loader__icon">🏐</span>
            <span class="fun-orbit-loader__icon">🏃</span>
          </div>
          <div class="fun-orbit-loader__core">FUN</div>
        </div>
        <p class="fun-orbit-loader__tagline">Loading FUN…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
