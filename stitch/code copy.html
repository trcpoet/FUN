<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Global Map View - Immersive Sports Discovery</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Outfit:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00F2FE", // Cyber Teal
                        "background-light": "#f5f8f8",
                        "background-dark": "#0B0C10", // Deep Void
                        "surface": "rgba(18, 20, 28, 0.70)",
                        "text": "#F8FAFC",
                        "muted": "#64748B",
                        "accent": "#FF6A00", // Blaze Orange
                        "border": "rgba(255, 255, 255, 0.08)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Outfit", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px", "md": "12px"},
                    boxShadow: {
                        'neon': '0 0 16px rgba(0, 242, 254, 0.3)',
                        'neon-hover': '0 0 32px rgba(0, 242, 254, 0.6)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Full bleed map */
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Custom Map Background to simulate mapbox dark theme */
        .map-container {
            background-color: #0B0C10;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(18, 20, 28, 0.4) 0%, transparent 100%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100px 100px, 100px 100px;
            background-position: center center;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background-color: var(--color-surface, rgba(18, 20, 28, 0.70));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--color-border, rgba(255, 255, 255, 0.08));
            border-top: 1px solid rgba(255, 255, 255, 0.15); /* Top highlight */
        }

        /* Map Pins */
        .cluster-pin {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .cluster-pin:hover {
            transform: scale(1.1);
            box-shadow: 0 0 32px rgba(0, 242, 254, 0.6);
            z-index: 50;
        }

        /* User Location Pulse */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .user-pulse::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid #00F2FE;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="bg-background-dark text-text h-screen w-screen relative">
<!-- Map Base Layer (Simulated) -->
<div class="map-container absolute inset-0 z-0">
<!-- Faux Roads/Features -->
<svg class="absolute inset-0 w-full h-full opacity-20 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<path d="M-100 200 Q 300 400 600 100 T 1200 500" fill="none" stroke="#12141C" stroke-width="8"></path>
<path d="M200 -100 Q 400 300 300 700 T 500 1200" fill="none" stroke="#12141C" stroke-width="12"></path>
<path d="M800 -50 Q 700 400 900 600 T 1400 800" fill="none" stroke="#12141C" stroke-width="6"></path>
</svg>
<!-- Neighborhood Labels -->
<div class="absolute top-[20%] left-[60%] text-muted font-display text-sm tracking-widest uppercase opacity-50 pointer-events-none">Downtown</div>
<div class="absolute top-[60%] left-[20%] text-muted font-display text-sm tracking-widest uppercase opacity-50 pointer-events-none">Westside Park</div>
<div class="absolute top-[75%] left-[75%] text-muted font-display text-sm tracking-widest uppercase opacity-50 pointer-events-none">East End</div>
</div>
<!-- UI Overlay Layer -->
<div class="absolute inset-0 z-10 pointer-events-none">
<!-- Top Left HUD: Search Bar -->
<div class="absolute top-6 left-6 w-[360px] pointer-events-auto">
<div class="glass-panel rounded-md flex items-center h-12 px-4 shadow-lg">
<span class="material-symbols-outlined text-muted mr-3">magnification_large</span>
<input class="bg-transparent border-none text-text placeholder-muted focus:ring-0 p-0 w-full font-body text-base outline-none" placeholder="Search neighborhoods, parks, or sports..." type="text"/>
</div>
</div>
<!-- Top Right HUD: Profile/Settings -->
<div class="absolute top-6 right-6 flex gap-3 pointer-events-auto">
<button class="glass-panel rounded-full w-12 h-12 flex items-center justify-center hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-text">tune</span>
</button>
<button class="glass-panel rounded-full w-12 h-12 flex items-center justify-center hover:bg-white/5 transition-colors overflow-hidden border-2 border-primary/30">
<img alt="User profile avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHN90tNeejdLHZa2A6frJ75TeA0CtCEj_yCqIeIExzIwyiR6c-6vGZrwUKP2aXxx0-7LCW9TZ7IbD1CEvQtqlMmCKjHroMWRo3vE5R8pS71ja_NRMDHT_I1MQ6ABriwVz0rqNKp6EZrA79dVwHytArEenhM8a4N4Csv2cc1_d4UuXxAjD6rihH22lSMgVomvV2KgKl9Sc4Byseh3KbU3mj2MfcypMYc2yiV9j12Tu0IQfAbUxmjzIupZw2EbpAFdn_710S4lOjYdQ"/>
</button>
</div>
<!-- Bottom Right HUD: Map Controls -->
<div class="absolute bottom-8 right-6 flex flex-col gap-2 pointer-events-auto">
<div class="glass-panel rounded-md flex flex-col overflow-hidden">
<button class="w-10 h-10 flex items-center justify-center hover:bg-white/5 transition-colors border-b border-white/10">
<span class="material-symbols-outlined text-text">add</span>
</button>
<button class="w-10 h-10 flex items-center justify-center hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-text">remove</span>
</button>
</div>
<button class="glass-panel rounded-md w-10 h-10 flex items-center justify-center hover:bg-white/5 transition-colors mt-2 text-primary shadow-neon">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Interactive Map Pins (Pointer events auto to allow clicking) -->
<div class="absolute inset-0 pointer-events-auto">
<!-- User Location Indicator -->
<div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 flex items-center justify-center z-20">
<div class="relative user-pulse flex items-center justify-center">
<div class="w-4 h-4 bg-primary rounded-full shadow-[0_0_12px_rgba(0,242,254,0.8)] border-2 border-background-dark"></div>
<!-- Heading direction cone (subtle) -->
<div class="absolute -top-6 w-0 h-0 border-l-[12px] border-r-[12px] border-b-[24px] border-l-transparent border-r-transparent border-b-primary/20 origin-bottom rotate-45"></div>
</div>
</div>
<!-- Cluster Pin 1: High Activity -->
<button class="cluster-pin absolute top-[30%] left-[40%] -translate-x-1/2 -translate-y-1/2 w-12 h-12 rounded-full glass-panel flex items-center justify-center shadow-neon cursor-pointer group">
<div class="flex gap-1 items-center justify-center">
<span class="material-symbols-outlined text-primary text-[18px]">sports_basketball</span>
<span class="material-symbols-outlined text-primary text-[18px]">sports_tennis</span>
</div>
<!-- Badge for active players -->
<div class="absolute -top-2 -right-2 bg-primary text-background-dark text-[10px] font-display font-bold px-1.5 py-0.5 rounded-full border border-background-dark">
                    24
                </div>
</button>
<!-- Cluster Pin 2: Medium Activity -->
<button class="cluster-pin absolute top-[65%] left-[25%] -translate-x-1/2 -translate-y-1/2 w-12 h-12 rounded-full glass-panel flex items-center justify-center shadow-[0_0_8px_rgba(0,242,254,0.2)] cursor-pointer hover:shadow-neon">
<div class="flex gap-1 items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">sports_soccer</span>
</div>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-accent rounded-full border-2 border-background-dark"></div>
</button>
<!-- Cluster Pin 3: Low Activity -->
<button class="cluster-pin absolute top-[25%] left-[75%] -translate-x-1/2 -translate-y-1/2 w-12 h-12 rounded-full glass-panel flex items-center justify-center shadow-[0_0_8px_rgba(0,242,254,0.1)] cursor-pointer hover:shadow-neon opacity-80">
<div class="flex gap-1 items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">fitness_center</span>
</div>
</button>
<!-- Ad-Hoc Game Pin 1 -->
<button class="absolute top-[45%] left-[65%] -translate-x-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center cursor-pointer group hover:scale-110 transition-transform z-30">
<!-- Diamond shape -->
<div class="w-6 h-6 bg-accent rotate-45 border-2 border-background-dark shadow-[0_0_12px_rgba(255,106,0,0.4)] flex items-center justify-center group-hover:bg-white transition-colors"></div>
<!-- Mini icon inside -->
<span class="material-symbols-outlined absolute text-background-dark text-[14px] font-bold pointer-events-none">directions_run</span>
</button>
<!-- Ad-Hoc Game Pin 2 -->
<button class="absolute top-[80%] left-[55%] -translate-x-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center cursor-pointer group hover:scale-110 transition-transform z-30">
<div class="w-6 h-6 bg-accent rotate-45 border-2 border-background-dark shadow-[0_0_12px_rgba(255,106,0,0.4)] flex items-center justify-center group-hover:bg-white transition-colors"></div>
<span class="material-symbols-outlined absolute text-background-dark text-[14px] font-bold pointer-events-none">sports_volleyball</span>
</button>
</div>
</div>
</body></html>
