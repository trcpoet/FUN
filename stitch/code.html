<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ad-Hoc Game View</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&amp;family=Outfit:wght@400..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#06edf9",
          "background-light": "#f5f8f8",
          "background-dark": "#0B0C10",
          "surface": "rgba(18, 20, 28, 0.70)",
          "muted": "#64748B",
          "accent": "#FF6A00",
          "border-ghost": "rgba(255, 255, 255, 0.08)",
          "tooltip-bg": "#1A1C23"
        },
        fontFamily: {
          "display": ["Space Grotesk", "sans-serif"],
          "body": ["Outfit", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        boxShadow: {
            "neon": "0 0 16px rgba(0, 242, 254, 0.3)"
        }
      },
    },
  }
</script>
<style>
  body {
    font-family: 'Outfit', sans-serif;
  }
  h1, h2, h3, h4, h5, h6, .font-display {
    font-family: 'Space Grotesk', sans-serif;
  }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Simulated Map Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-40 mix-blend-luminosity" data-alt="Dark aerial view of a city map at night" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCwxBWpe1q60_ZWIAT4cNVndq2NM_HDHtG8v9Dbsxg5KgXB4otj1162mBsZzBz5ObJDi5i76SYgvTXsrfQ5dWARuWbfixWo62u74eBXR0qQmpZB5jdgazch-hfmK-Uy8LT-9U3XRCw6xqj7Wu8O-MzAbIA7A1phphJhPjNJnF6EHD2SU7gVkrJ4mQsyiGVjT3hwvBYqxnpXo0XYjtNMzgwTsR3ROuDFTX4GBrfSwVvPKQGrzwF59OaHDQtk9TnygG5MSfakNMnCJFs');"></div>
<div class="absolute inset-0 z-0 bg-background-dark/80"></div>
<!-- Ad-Hoc Game View (Tooltip) -->
<div class="relative z-10 w-[200px] bg-tooltip-bg rounded shadow-lg border-l-2 border-accent p-3 flex flex-col gap-3 group">
<!-- Header / Details -->
<div class="flex flex-col gap-1">
<h3 class="font-display font-bold text-accent text-base leading-tight truncate">Street Soccer</h3>
<p class="text-muted text-[13px] leading-snug">Starts in 10 mins • by @alex</p>
</div>
<!-- Join Button (Initial State: Orange) -->
<!-- Note: Toggling to Joined state (Teal) requires JS, simulating default state here as per instructions, but added hover effects for interactivity preview -->
<button class="w-full h-8 bg-accent hover:bg-accent/90 text-[#0B0C10] font-display font-semibold text-sm tracking-[0.5px] rounded transition-colors duration-200 flex items-center justify-center group-focus-within:bg-primary group-focus-within:text-[#0B0C10]">
<span class="group-focus-within:hidden">Join</span>
<span class="hidden group-focus-within:block">Joined</span>
</button>
</div>
<!-- Simulated Pin anchor for context -->
<div class="absolute z-0 mt-[120px] w-8 h-8 bg-accent rotate-45 flex items-center justify-center rounded-sm shadow-[0_0_12px_rgba(255,106,0,0.4)]">
<span class="material-symbols-outlined text-[#0B0C10] -rotate-45 text-sm font-bold" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
</body></html>
