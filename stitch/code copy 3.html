<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Venue Widget View</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Outfit:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06edf9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0B0C10",
                        "surface": "rgba(18, 20, 28, 0.70)",
                        "muted": "#64748B",
                        "accent": "#FF6A00",
                        "border-ghost": "rgba(255, 255, 255, 0.08)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Outfit", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "sm": "8px",
                        "md": "12px",
                        "lg": "16px",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'neon': '0 0 16px rgba(6, 237, 249, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Outfit', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        /* Simulating the pulsing animation for Tailwind v3 without custom config animations if possible, but adding keyframes via style is cleaner for this specific constraint */
        @keyframes pulse-accent {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.2); }
        }
        .animate-pulse-accent {
            animation: pulse-accent 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Simulated Map Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-40 mix-blend-luminosity" data-alt="Dark abstract map topography view" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBvI2eumkw59dDThMCh9qI-6aCqZXIFA9rdpdwmwCe9Ne-5pOXcTkexG1-cMh4WINmeH9i1aImCTPnTUCqBARtsIgo6bXytQhReDST1K1SPm_MILCS1UqIO4FTt5PSH45WXSjPiRlj8grV3LG3z4xQjay1djcqlGUdhRgXwNS_Kof2N6VFA2q8U1msh6n91OoFci4xQEfbVceiYp_h1EsQ33ekvO8REUICovu75vIxiy620NJhbCbzcjw5hQweGp2nci61iZgmApHs');">
</div>
<div class="absolute inset-0 z-0 bg-background-dark/80"></div>
<!-- Map Pin Anchor (Simulated) -->
<div class="absolute z-10 top-1/2 left-1/2 transform -translate-x-1/2 translate-y-24 flex flex-col items-center">
<!-- Pin -->
<div class="w-12 h-12 rounded-full bg-surface backdrop-blur-[24px] border border-border-ghost flex items-center justify-center shadow-neon cursor-pointer transition-transform hover:scale-110">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">sports_basketball</span>
</div>
</div>
<!-- Venue Widget -->
<!-- Positioned absolutely, relative to the viewport/map, anchored above the pin -->
<div class="absolute z-20 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[80px] w-[280px] max-h-[320px] bg-surface backdrop-blur-[24px] rounded-md border-t border-t-white/20 border-l border-l-white/5 border-r border-r-white/5 border-b border-b-transparent shadow-2xl flex flex-col overflow-hidden">
<!-- Header -->
<div class="px-4 pt-5 pb-3 border-b border-border-ghost">
<h2 class="font-display text-lg font-bold text-white tracking-wide leading-tight">Central Park Courts</h2>
<p class="font-body text-[13px] text-muted mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">location_on</span>
                0.8 miles away
            </p>
</div>
<!-- Sport Rows List -->
<div class="flex flex-col flex-1 overflow-y-auto py-2">
<!-- Sport Row: Basketball -->
<button class="w-full flex items-center justify-between h-[64px] px-4 hover:bg-white/5 transition-colors group cursor-pointer border-l-2 border-transparent hover:border-primary">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center border border-white/5 group-hover:border-primary/30 transition-colors">
<span class="material-symbols-outlined text-slate-300 group-hover:text-primary transition-colors" data-icon="sports_basketball" data-size="24px">sports_basketball</span>
</div>
<div class="flex flex-col items-start">
<span class="font-display font-semibold text-[15px] text-slate-100">Basketball</span>
<div class="flex items-center gap-1.5 mt-0.5">
<div class="w-2 h-2 rounded-full bg-accent animate-pulse-accent shadow-[0_0_8px_rgba(255,106,0,0.6)]"></div>
<span class="font-body text-[13px] text-slate-300">12 Active</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Sport Row: Tennis -->
<button class="w-full flex items-center justify-between h-[64px] px-4 hover:bg-white/5 transition-colors group cursor-pointer border-l-2 border-transparent hover:border-primary">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center border border-white/5 group-hover:border-primary/30 transition-colors">
<span class="material-symbols-outlined text-slate-300 group-hover:text-primary transition-colors" data-icon="sports_tennis" data-size="24px">sports_tennis</span>
</div>
<div class="flex flex-col items-start">
<span class="font-display font-semibold text-[15px] text-slate-100">Tennis</span>
<div class="flex items-center gap-1.5 mt-0.5">
<div class="w-2 h-2 rounded-full bg-accent animate-pulse-accent shadow-[0_0_8px_rgba(255,106,0,0.6)]"></div>
<span class="font-body text-[13px] text-slate-300">4 Active</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Sport Row: Volleyball (Inactive/Empty state example) -->
<button class="w-full flex items-center justify-between h-[64px] px-4 hover:bg-white/5 transition-colors group cursor-pointer border-l-2 border-transparent hover:border-primary opacity-60 hover:opacity-100">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-black/20 flex items-center justify-center border border-white/5 group-hover:border-primary/30 transition-colors">
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors" data-icon="sports_volleyball" data-size="24px">sports_volleyball</span>
</div>
<div class="flex flex-col items-start">
<span class="font-display font-medium text-[15px] text-muted group-hover:text-slate-200 transition-colors">Volleyball</span>
<div class="flex items-center gap-1.5 mt-0.5">
<div class="w-2 h-2 rounded-full bg-slate-600"></div>
<span class="font-body text-[13px] text-muted">0 Active</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-muted group-hover:text-primary transition-colors text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</body></html>
